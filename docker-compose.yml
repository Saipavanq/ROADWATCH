version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=roadwatch
      - JWT_SECRET=supersecret123
      - AI_SERVICE_URL=http://ai-service:8000
      - CLIENT_URL=http://localhost
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/roadwatch
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "80:80"
      - "5173:80"
    depends_on:
      - backend

  authority-frontend:
    build: ./authority-frontend
    ports:
      - "5174:80"
    depends_on:
      - backend

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=roadwatch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/phase2_migration.sql:/docker-entrypoint-initdb.d/2-seed.sql

volumes:
  pgdata:
